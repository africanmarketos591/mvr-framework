{
  "openapi": "3.0.0",
  "info": {
    "title": "MVR Core API",
    "version": "v6.32.0",
    "description": "v6.32.0 MVR Engine. Additive dual-lane runtime: public_reality + local_relational_assessment + reconciled_assessment, deterministic ROI, dual-profile governance, entity-resolution preflight, modality-aware completeness/audit, compiled_evidence ingestion, provenance-ledger validation, telemetry translation, gap planning, market leak scanning, and validation snapshot metadata. Send X-Response-Profile: strict_calibrated for fail-closed institutional responses. See /v1/schema for full documentation."
  },
  "x-compatibility-policy": {
    "principle": "No output may claim a decision level, confidence level, category fit, or scope stronger than verified evidence permits.",
    "verdict_order": [
      "permission_not_yet_earned",
      "pilot_only",
      "pilot_ready",
      "ready_to_scale"
    ],
    "weakest_link_floors": {
      "ready_to_scale": 45,
      "pilot_ready": 35
    },
    "score_direct": "non_decisive_operator_review"
  },
  "x-public-metrics-schema-version": "v6.32.0",
  "x-modality-examples": {
    "public_osint": "Use public_metrics with evidence_origin:'public_osint'. Read reconciled_assessment first, then public_reality for entity-scale interpretation.",
    "field_research": "Use structured_values on field items. Read reconciled_assessment first, then local_relational_assessment for zone-level interpretation.",
    "corporate_telemetry": "Use evidence_origin:'corporate_telemetry' or collection_method:'corporate_telemetry' for proxy-derived internal data. The engine routes it into the local lane with capped confidence and explicit proxy transparency.",
    "compiled_evidence": "Use mode:'compiled_evidence' with compiled_pack lanes from compiled_pack_registry. You may nest legacy evidence_pack[] inside compiled_pack; the runtime maps it into localized_observed_pack (or public lane when pack_type indicates public). Items with full provenance_ledger use compiled_evidence validation; others use evidence_backed rules.",
    "mixed": "Mixed packs reconcile both lanes. Public facts do not impersonate local truth; local friction does not erase entity-scale reality.",
    "abstention": "Scope-limited abstentions are returned when localized claims are unsupported by direct field evidence."
  },
