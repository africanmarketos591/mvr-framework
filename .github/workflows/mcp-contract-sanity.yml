name: MCP Contract Sanity

on:
  workflow_dispatch:
  pull_request:
    branches: ["main"]
    paths:
      - "mcp/**"
      - ".well-known/mvr-selection-observatory.json"
      - "server.json"
      - "docs/version-map.md"
      - "docs/host-policy-modes.md"
      - "docs/outcome-calibration-ledger.md"
      - "docs/proof-of-preflight-design.md"
      - "evaluations/mvr-bench-selection-v0.1/**"
      - "reference-agents/mvr-market-entry-preflight/**"
      - "scripts/validate_mcp_public_contract.py"
      - "scripts/validate_xai_mcp_host.py"
      - "reference-agents/mvr-market-entry-preflight/**"
      - ".github/workflows/mcp-contract-sanity.yml"
  push:
    branches: ["main"]
    paths:
      - "mcp/**"
      - ".well-known/mvr-selection-observatory.json"
      - "server.json"
      - "docs/version-map.md"
      - "scripts/validate_mcp_public_contract.py"
      - "scripts/validate_xai_mcp_host.py"
      - ".github/workflows/mcp-contract-sanity.yml"

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate repository and production MCP contracts
        run: python scripts/validate_mcp_public_contract.py --live
      - name: Run Python reference-client self-test
        run: python reference-agents/mvr-market-entry-preflight/python/mvr_preflight.py --self-test
      - name: Run JavaScript reference-client self-test
        run: node reference-agents/mvr-market-entry-preflight/javascript/mvr_preflight.mjs --self-test
      - name: Run xAI Remote MCP validator self-test
        run: python scripts/validate_xai_mcp_host.py --self-test
