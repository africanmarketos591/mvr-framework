name: Outcome Calibration Contract

on:
  workflow_dispatch:
  pull_request:
    branches: ["main"]
    paths:
      - "docs/outcome-calibration-ledger.md"
      - "scripts/validate_outcome_calibration_contract.py"
      - ".github/workflows/outcome-calibration-contract.yml"
  push:
    branches: ["main"]
    paths:
      - "docs/outcome-calibration-ledger.md"
      - "scripts/validate_outcome_calibration_contract.py"
      - ".github/workflows/outcome-calibration-contract.yml"

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate local outcome-calibration contract
        run: python scripts/validate_outcome_calibration_contract.py
      - name: Validate production outcome-calibration contract
        run: python scripts/validate_outcome_calibration_contract.py --live
