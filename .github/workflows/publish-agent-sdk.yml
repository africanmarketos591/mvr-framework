name: Publish MVR Agent SDK

on:
  workflow_dispatch:
    inputs:
      target:
        description: Package target to publish
        required: true
        default: dry-run
        type: choice
        options:
          - dry-run
          - npm
          - pypi
          - all
  push:
    tags:
      - "mvr-agent-sdk-v*.*.*"

permissions:
  contents: read
  id-token: write

jobs:
  validate:
    name: Validate SDK packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validate npm package
        working-directory: packages/mvr-agent-sdk/npm
        run: |
          node --check src/index.js
          npm pack --dry-run

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate Python package
        working-directory: packages/mvr-agent-sdk/python
        run: |
          python -m pip install --upgrade build twine
          python -m py_compile mvr_agent_sdk/client.py mvr_agent_sdk/__init__.py
          python -m build
          python -m twine check dist/*

  publish-npm:
    name: Publish npm package
    needs: validate
    runs-on: ubuntu-latest
    if: ${{ startsWith(github.ref, 'refs/tags/mvr-agent-sdk-v') || (github.event_name == 'workflow_dispatch' && (inputs.target == 'npm' || inputs.target == 'all')) }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Publish npm package
        working-directory: packages/mvr-agent-sdk/npm
        run: npm publish --provenance --access public

  publish-pypi:
    name: Publish PyPI package
    needs: validate
    runs-on: ubuntu-latest
    if: ${{ startsWith(github.ref, 'refs/tags/mvr-agent-sdk-v') || (github.event_name == 'workflow_dispatch' && (inputs.target == 'pypi' || inputs.target == 'all')) }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build Python distributions
        working-directory: packages/mvr-agent-sdk/python
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Publish Python package to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: packages/mvr-agent-sdk/python/dist
